<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngoMarket V3.1 - OTP</title>

<style>
/* --- BASE & LAYOUT --- */
body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; padding-top: 60px; }
input, select, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
button { width: 100%; padding: 12px; margin-top: 15px; background: #cc0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-secondary { background: #666; }
.btn-success { background: #28a745; }

/* --- TOPBAR & RECHERCHE --- */
.topbar { position: fixed; top: 0; left: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 900; box-sizing: border-box; }
.logo { font-weight: 800; color: #cc0000; font-size: 20px; white-space: nowrap; }
.search-container { flex-grow: 1; margin: 0 15px; }
.search-bar { width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
.menuBtn { font-size: 24px; cursor: pointer; }

/* --- MENU LATÉRAL --- */
.menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
.sideMenu { position: fixed; top: 0; left: -280px; width: 250px; height: 100%; background: white; box-shadow: 2px 0 15px rgba(0,0,0,.2); padding: 20px; transition: 0.3s; z-index: 1000; }
.sideMenu a { display: block; padding: 15px 10px; border-bottom: 1px solid #eee; cursor: pointer; color: #333; text-decoration: none; font-weight: bold; }

/* --- AUTHENTIFICATION --- */
.authBox { max-width: 350px; margin: 40px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,.1); }
.auth-tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #eee; }
.auth-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; }
.auth-tab.active { color: #cc0000; border-bottom: 2px solid #cc0000; font-weight: bold; }
.auth-form { display: none; }
.auth-form.active { display: block; }

/* --- VUES DE L'APPLICATION --- */
.app { display: none; }
.view { display: none; padding: 15px; }
.active-view { display: block; }

/* --- CARTES PRODUITS --- */
.product-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.fab-btn { position: fixed; bottom: 20px; right: 20px; width: auto; padding: 15px 25px; border-radius: 50px; box-shadow: 0 4px 10px rgba(204,0,0,0.4); z-index: 800;}
</style>
</head>

<body>

<div id="auth" class="authBox">
  <h2 style="text-align: center; color: #cc0000; margin-top:0;">AngoMarket</h2>
  
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchAuthTab('login')">Connexion</div>
    <div class="auth-tab" onclick="switchAuthTab('register')">S'inscrire</div>
  </div>

  <div id="form-login" class="auth-form active">
    <input id="loginEmail" type="email" placeholder="Email (Si inscrit par email)">
    <input id="loginPassword" type="password" placeholder="Mot de passe">
    <button onclick="loginEmail()">Se connecter par Email</button>
    <hr style="margin:20px 0; border:0; border-top:1px solid #ddd;">
    <p style="text-align:center; font-size:12px; color:#666;">Ou connectez-vous avec votre numéro via l'onglet "S'inscrire"</p>
  </div>

  <div id="form-register" class="auth-form">
    <input id="regName" type="text" placeholder="Nom complet">
    <input id="regPhone" type="tel" placeholder="+244 (ex: +244900000000)">
    
    <div id="recaptcha-container" style="margin-top: 10px;"></div>

    <button id="btnSendOTP" onclick="sendOTP()">1. Recevoir le code SMS</button>

    <div id="otp-section" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc;">
      <p style="font-size: 12px; color: #666; text-align: center;">Un code a été envoyé à votre numéro.</p>
      <input id="otpCode" type="text" placeholder="Entrez le code à 6 chiffres">
      <button class="btn-success" onclick="verifyOTP()">2. Confirmer le compte</button>
    </div>
  </div>
</div>

<div id="app" class="app">
  <div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">☰</div>
    <div class="logo">AngoMarket</div>
    <div class="search-container"><input type="text" class="search-bar" placeholder="Chercher..."></div>
  </div>
  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
  <div class="sideMenu" id="menu">
    <h3 style="color:#cc0000;">Menu</h3>
    <a onclick="switchView('homeView')">🏠 Accueil</a>
    <a onclick="logout()" style="color: red;">🚪 Se déconnecter</a>
  </div>

  <div id="homeView" class="view active-view">
    <h3>Bienvenue sur AngoMarket</h3>
    <p>Vous êtes connecté avec succès !</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj9GfibZ77BepNSaoZviqDF-qeNRcz064",
  authDomain: "angomarket-1543f.firebaseapp.com",
  projectId: "angomarket-1543f",
  storageBucket: "angomarket-1543f.firebasestorage.app",
  messagingSenderId: "14599437423",
  appId: "1:14599437423:web:ec4401fd1e852928b2a19a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// --- GESTION DE L'INTERFACE ---
window.switchAuthTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  if(tab === 'login') {
    document.querySelectorAll('.auth-tab')[0].classList.add('active');
    document.getElementById('form-login').classList.add('active');
  } else {
    document.querySelectorAll('.auth-tab')[1].classList.add('active');
    document.getElementById('form-register').classList.add('active');
  }
};

window.toggleMenu = () => {
  const m = document.getElementById("menu");
  const overlay = document.getElementById("menuOverlay");
  if (m.style.left === "0px") { m.style.left = "-280px"; overlay.style.display = "none"; } 
  else { m.style.left = "0px"; overlay.style.display = "block"; }
};

window.switchView = (viewId) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
  document.getElementById(viewId).classList.add('active-view');
  document.getElementById("menu").style.left = "-280px";
  document.getElementById("menuOverlay").style.display = "none";
};

// --- AUTHENTIFICATION PAR TÉLÉPHONE (OTP) ---

window.setupRecaptcha = () => {
  if (!window.recaptchaVerifier) {
    // Crée le reCAPTCHA de Firebase
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      'size': 'normal',
      'callback': (response) => {
        // reCAPTCHA résolu, on peut envoyer le SMS
        console.log("reCAPTCHA validé");
      }
    });
  }
};

window.sendOTP = async () => {
  const phoneVal = document.getElementById("regPhone").value.trim();
  const nameVal = document.getElementById("regName").value.trim();

  if (!nameVal) { alert("Veuillez entrer votre nom complet."); return; }
  if (!phoneVal.startsWith("+244") || phoneVal.length < 12) { 
    alert("Le numéro doit commencer par +244 suivi de votre numéro à 9 chiffres."); return; 
  }

  // Désactiver le bouton pour éviter les doubles clics
  document.getElementById("btnSendOTP").disabled = true;
  document.getElementById("btnSendOTP").innerText = "Envoi en cours...";

  try {
    window.setupRecaptcha();
    const appVerifier = window.recaptchaVerifier;
    
    // Demander à Firebase d'envoyer le SMS
    const confirmationResult = await signInWithPhoneNumber(auth, phoneVal, appVerifier);
    window.confirmationResult = confirmationResult;
    
    // Afficher la zone pour taper le code
    document.getElementById("otp-section").style.display = "block";
    document.getElementById("btnSendOTP").style.display = "none";
    document.getElementById("recaptcha-container").style.display = "none";
    
    alert("Code SMS envoyé !");
  } catch (error) {
    alert("Erreur lors de l'envoi du SMS : " + error.message);
    document.getElementById("btnSendOTP").disabled = false;
    document.getElementById("btnSendOTP").innerText = "1. Recevoir le code SMS";
  }
};

window.verifyOTP = async () => {
  const code = document.getElementById("otpCode").value.trim();
  const nameVal = document.getElementById("regName").value.trim();
  const phoneVal = document.getElementById("regPhone").value.trim();

  if (code.length !== 6) { alert("Le code doit contenir 6 chiffres."); return; }

  try {
    // Vérifier le code saisi
    const result = await window.confirmationResult.confirm(code);
    const user = result.user;

    // Sauvegarder le profil dans la base de données (Firestore)
    await setDoc(doc(db, "utilisateurs", user.uid), {
      nom: nameVal,
      telephone: phoneVal,
      dateInscription: new Date()
    });

    alert("Compte créé et vérifié avec succès !");
    
    // Afficher l'application
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch (error) {
    alert("Code incorrect ou expiré. Veuillez réessayer.");
  }
};

// --- AUTHENTIFICATION CLASSIQUE (Pour tes tests ou anciens comptes) ---
window.loginEmail = async () => {
  const emailVal = document.getElementById("loginEmail").value;
  const passVal = document.getElementById("loginPassword").value;
  try {
    await signInWithEmailAndPassword(auth, emailVal, passVal);
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch(e) { alert("Erreur : " + e.message); }
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};
</script>

</body>
</html>
