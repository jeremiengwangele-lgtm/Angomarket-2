<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngoMarket</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}

.menuBtn{
  font-size:24px;
  padding:15px;
  cursor:pointer;
}

.authBox{
  max-width:350px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#cc0000;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.toggle{
  font-size:12px;
  cursor:pointer;
  color:blue;
}

.app{
  display:none;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:white;
}

.logo{
  font-weight:800;
  color:#cc0000;
}

.sideMenu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:white;
  box-shadow:0 4px 15px rgba(0,0,0,.2);
  padding:20px;
  transition:0.3s;
}

.sideMenu a{
  display:block;
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div id="auth" class="authBox">

  <h2>AngoMarket</h2>
  <p>Faça o seu marketing de formas simples</p>

  <input id="email" placeholder="Email">
  <input id="phone" placeholder="+244 número de telefone">
  <input id="password" type="password" placeholder="Senha">
  <div class="toggle" onclick="togglePass()">Mostrar senha</div>

  <button onclick="register()">Criar conta</button>
  <button onclick="login()">Entrar</button>

  <p onclick="resetPassword()" style="cursor:pointer;color:blue">
    Esqueci a senha
  </p>

</div>

<div id="app" class="app">

  <div class="topbar">
    <div class="logo">AngoMarket</div>
    <div class="menuBtn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="sideMenu" id="menu">
    <a>Perfil</a>
    <a>Minhas Anúncios</a>
    <a onclick="logout()">Sair</a>
  </div>

  <h3 style="padding:20px">Bem-vindo à AngoMarket</h3>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  sendEmailVerification,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj9GfibZ77BepNSaoZviqDF-qeNRcz064",
  authDomain: "angomarket-1543f.firebaseapp.com",
  projectId: "angomarket-1543f",
  storageBucket: "angomarket-1543f.firebasestorage.app",
  messagingSenderId: "14599437423",
  appId: "1:14599437423:web:ec4401fd1e852928b2a19a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async () => {
  const emailVal = document.getElementById("email").value;
  const phoneVal = document.getElementById("phone").value;
  const passVal = document.getElementById("password").value;

  if(!phoneVal.startsWith("+244")){
    alert("Número deve começar com +244");
    return;
  }

  try{
    const user = await createUserWithEmailAndPassword(auth,emailVal,passVal);
    await sendEmailVerification(user.user);
    alert("Conta criada. Verifique seu email.");
  }catch(e){
    alert(e.message);
  }
};

window.login = async () => {
  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth,emailVal,passVal);
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
  }catch(e){
    alert("Erro login");
  }
};

window.resetPassword = async () => {
  const emailVal = document.getElementById("email").value;
  await sendPasswordResetEmail(auth,emailVal);
  alert("Email de recuperação enviado");
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

window.togglePass = () => {
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
};

window.toggleMenu = () => {
  const m = document.getElementById("menu");
  m.style.left = (m.style.left === "0px") ? "-250px" : "0px";
};

</script>

</body>
</html>
